# Goranked Chat Desk — Windows + macOS → GitHub Releases (+ опционально rsync на goranked.gg).
#
# Как выпустить обновление менеджерам:
# 1) Поднять "version" в package.json (должен совпадать с тегом, без префикса v)
# 2) git add package.json && git commit && git push
# 3) git tag v1.2.3 && git push origin v1.2.3
#
# Ручной запуск: Actions → Build and Release → Run workflow → в поле "Use workflow from"
#    выберите тег (Tags → v…), иначе ref будет main и релиз не соберётся.
#
# Секреты: см. GITHUB-SECRETS.md (обязательно REVERB_APP_KEY).

name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: chatdesk-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  reject-non-tag-dispatch:
    name: (workflow_dispatch) потрібен тег
    if: github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::error::У Run workflow виберіть тег (Use workflow from → Tags → v…), не гілку main."
          exit 1

  build-windows:
    name: Windows (NSIS + latest.yml)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build installer
        shell: pwsh
        env:
          NODE_ENV: production
          UPDATE_URL: https://goranked.gg/chat-desk/releases
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVERB_HOST: ${{ secrets.REVERB_HOST || 'goranked.gg' }}
          REVERB_PORT: ${{ secrets.REVERB_PORT || '443' }}
          REVERB_SCHEME: ${{ secrets.REVERB_SCHEME || 'https' }}
          REVERB_APP_KEY: ${{ secrets.REVERB_APP_KEY }}
          API_URL: ${{ secrets.API_URL || 'https://goranked.gg' }}
        run: npm run build:win:installer

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Goranked Chat Desk ${{ github.ref_name }}
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          make_latest: true
          generate_release_notes: true
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error

  build-mac:
    name: macOS (DMG + ZIP + latest-mac.yml)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows]
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build macOS
        env:
          NODE_ENV: production
          UPDATE_URL: https://goranked.gg/chat-desk/releases
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVERB_HOST: ${{ secrets.REVERB_HOST || 'goranked.gg' }}
          REVERB_PORT: ${{ secrets.REVERB_PORT || '443' }}
          REVERB_SCHEME: ${{ secrets.REVERB_SCHEME || 'https' }}
          REVERB_APP_KEY: ${{ secrets.REVERB_APP_KEY }}
          API_URL: ${{ secrets.API_URL || 'https://goranked.gg' }}
        run: npm run build:mac:installer

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Goranked Chat Desk ${{ github.ref_name }}
          files: |
            release/mac/*.dmg
            release/*.zip
            release/latest-mac.yml
            release/*.blockmap
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          allowUpdates: true
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            release/mac/*.dmg
            release/*.zip
            release/latest-mac.yml
            release/*.blockmap
          if-no-files-found: warn

  deploy:
    name: Deploy to goranked.gg (optional)
    needs: [build-windows, build-mac]
    if: success() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets
        id: deploy
        run: |
          if [ -n "$DEPLOY_HOST" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "Skip deploy: задайте secret DEPLOY_HOST (и SSH_PRIVATE_KEY, DEPLOY_USER)."
          fi
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

      - name: Download Windows artifacts
        if: steps.deploy.outputs.ok == 'true'
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: _win

      - name: Download macOS artifacts
        if: steps.deploy.outputs.ok == 'true'
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: _mac

      - name: Merge into release/
        if: steps.deploy.outputs.ok == 'true'
        run: |
          mkdir -p release
          shopt -s nullglob
          for f in _win/release/*.exe _win/*.exe; do [ -f "$f" ] && cp "$f" release/; done
          for f in _win/release/*.blockmap _win/*.blockmap; do [ -f "$f" ] && cp "$f" release/; done
          for f in _win/release/latest.yml _win/latest.yml; do [ -f "$f" ] && cp "$f" release/; done
          for f in _mac/release/mac/*.dmg _mac/mac/*.dmg; do [ -f "$f" ] && cp "$f" release/; done
          for f in _mac/release/*.zip _mac/*.zip; do [ -f "$f" ] && cp "$f" release/; done
          for f in _mac/release/latest-mac.yml _mac/latest-mac.yml; do [ -f "$f" ] && cp "$f" release/; done
          for f in _mac/release/*.blockmap _mac/*.blockmap; do [ -f "$f" ] && cp "$f" release/; done
          ls -la release/

      - name: Build local deploy folder (releases.json)
        if: steps.deploy.outputs.ok == 'true'
        env:
          RELEASE_DEST: ${{ github.workspace }}/deploy-out
        run: |
          mkdir -p deploy-out
          node scripts/deploy-release.js

      - name: Setup SSH
        if: steps.deploy.outputs.ok == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync to server
        if: steps.deploy.outputs.ok == 'true'
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/var/www/master/data/www/goranked.gg/public/chat-desk/releases' }}
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            deploy-out/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$DEPLOY_PATH/"
          echo "Deployed to ${{ secrets.DEPLOY_HOST }}:$DEPLOY_PATH"
